version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: telecode_user
      POSTGRES_PASSWORD: telecode_password
      POSTGRES_DB: telecode_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telecode_user -d telecode_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
